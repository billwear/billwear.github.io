<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 50 }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 50 }}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">

  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="site-wrap">
<header class="site-header">
  <a href="mailto:williamowear@gmail.com" class="site-byline">Bill Wear</a>
  <a href="{{ '/' | relative_url }}" class="site-title-link">
    <h1 class="site-title">{{ site.title }}</h1>
  </a>
  <p class="site-tagline">{{ site.description }}</p>
  <nav class="site-nav">
    <a href="{{ '/' | relative_url }}">Writing</a>
    <a href="{{ '/about' | relative_url }}">About</a>
    <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
    <a href="{{ '/about#work-with-me' | relative_url }}">Work With Me</a>
  </nav>
</header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. All rights reserved.</p>
    </footer>
  </div>
</body>
</html>
