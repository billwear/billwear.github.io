<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stormrider</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }
        body {
            background-image: url('/images/stormrider.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #121214;
            display: flex;
            justify-content: flex-start; /* Aligns content to the left side */
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .container {
            padding: 40px;
            max-width: 800px;
        }
        h1 {
            color: #ffffff; /* White text */
            font-size: 2.5rem;
            line-height: 1.3;
            margin: 0 0 20px 0;
            font-weight: 600;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7); /* Ensures legibility over the clouds */
            
            /* The Slide-In Animation Mechanics */
            opacity: 0;
            transform: translateX(-30px); /* Starts 30 pixels to the left */
            animation: slideIn 0.8s ease-out forwards; /* Runs once for 0.8 seconds */
        }

        /* Define the animation keyframes */
        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0); /* Moves to its natural position */
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Stormrider's homStormrider's homepage</h1>
</div>

</body>
</html>
