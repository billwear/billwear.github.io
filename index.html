<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stormrider</title>
    <style>
        body {
            background-color: #121214;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .hero-image {
            width: 100%;
            height: auto;
            border-radius: 6px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            margin-bottom: 40px;
        }
        blockquote {
            border-left: 4px solid #38bdf8;
            background: #1e1e24;
            margin: 20px 0;
            padding: 15px 20px;
            text-align: left;
            border-radius: 0 4px 4px 0;
        }
        h1 {
            font-size: 1.8rem;
            line-height: 1.4;
            margin: 0;
            font-weight: 500;
        }
        .author {
            font-size: 1rem;
            color: #94a3b8;
            margin-top: 5px;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="/images/stormrider.jpg" alt="Stormrider" class="hero-image">

    <blockquote>
        <h1>"Kill all the lawyers."</h1>
        <span class="author">-- Shakespeare</span>
    </blockquote>

    <blockquote>
        <h1>"Forget the lawyers. Kill all the side quests."</h1>
        <span class="author">-- Me</span>
    </blockquote>
</div>

</body>
</html>
