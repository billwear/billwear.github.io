<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stormrider</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }
        body {
            background-image: url('/images/stormrider.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #121214;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start; /* Changed from center to push content to the top */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .title-container {
            padding: 60px 40px; /* Increased top padding slightly for a clean breathing room from the screen edge */
            max-width: 800px;
            width: 100%;
            box-sizing: border-box;
        }
        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            line-height: 1.3;
            margin: 0 0 30px 0; /* Slightly more space between the two quotes */
            font-weight: 600;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
            
            opacity: 0;
            transform: translateX(-30px);
            animation: slideIn 0.8s ease-out forwards;
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>

<div class="title-container">
    <h1>"Kill all the lawyers."<br>— Shakespeare</h1>
    <h1>"Forget the lawyers. Kill all the side quests."<br>— Me</h1>
</div>

</body>
</html>
